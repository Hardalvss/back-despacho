services:
  back-despacho:
    build: .
    container_name: back-despacho
    ports:
      - "8081:8081"
    env_file:
      - .env
    depends_on:
      - db-despacho
    restart: unless-stopped

  db-despacho:
    image: mysql:8
    container_name: db-despacho
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - dbdata_despacho:/var/lib/mysql
    restart: unless-stopped

volumes:
  dbdata_despacho: